<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>பரப்பளவு மாற்றி</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Tamil:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink:    #1a1f2e;
            --paper:  #faf8f3;
            --ledger: #f0ece0;
            --rule:   #d4c9a8;
            --gold:   #c8922a;
            --blue:   #1e3a5f;
            --muted:  #7a7060;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Noto Sans Tamil', sans-serif;
            background: var(--ledger);
            color: var(--ink);
            min-height: 100vh;
            padding: 16px;
            padding-bottom: 40px;
        }



        .toolbar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 12px;
        }
        .btn-clear {
            background: var(--blue);
            color: #fff;
            border: none;
            border-radius: 4px;
            padding: 6px 14px;
            font-family: 'Noto Sans Tamil', sans-serif;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.15s;
        }
        .btn-clear:active { background: #2a5298; }

        .field {
            margin-bottom: 12px;
        }
        .field label {
            display: block;
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 4px;
        }
        .field input {
            width: 100%;
            padding: 8px 10px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: var(--ink);
            background: var(--paper);
            border: 1px solid var(--rule);
            border-radius: 4px;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        .field input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 2px rgba(200,146,42,0.15);
        }
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
        input[type=number] { -moz-appearance: textfield; }
    </style>
</head>
<body>

    <div class="toolbar">
        <button class="btn-clear" onclick="clearAll()">அனைத்தையும் நீக்கு</button>
    </div>

    <div class="field">
        <label for="are">ஏர்ஸ்</label>
        <input type="number" id="are" placeholder="0" min="0" oninput="convertArea('are')">
    </div>
    <div class="field">
        <label for="sqm">சதுர மீட்டர்</label>
        <input type="number" id="sqm" placeholder="0" min="0" oninput="convertArea('sqm')">
    </div>
    <div class="field">
        <label for="acre">ஏக்கர்</label>
        <input type="number" id="acre" placeholder="0" min="0" oninput="convertArea('acre')">
    </div>
    <div class="field">
        <label for="sqft">சதுர அடிகள்</label>
        <input type="number" id="sqft" placeholder="0" min="0" oninput="convertArea('sqft')">
    </div>
    <div class="field">
        <label for="cent">சென்ட்</label>
        <input type="number" id="cent" placeholder="0" min="0" oninput="convertArea('cent')">
    </div>
    <div class="field">
        <label for="hectare">ஹெக்டேர்</label>
        <input type="number" id="hectare" placeholder="0" min="0" oninput="convertArea('hectare')">
    </div>

    <script>
        const conversionRates = {
            are:     1,
            sqm:     100,
            acre:    0.0247105,
            sqft:    1076.39,
            cent:    2.47105,
            hectare: 0.01
        };

        const ALL_UNITS = ['are', 'sqm', 'acre', 'sqft', 'cent', 'hectare'];

        function smartFormat(value) {
            if (value === 0) return '0';
            return parseFloat(value.toFixed(6)).toString();
        }

        function convertArea(fromUnit) {
            const value = parseFloat(document.getElementById(fromUnit).value);
            if (isNaN(value) || value < 0) {
                ALL_UNITS.forEach(u => { if (u !== fromUnit) document.getElementById(u).value = ''; });
                return;
            }
            const areValue = value / conversionRates[fromUnit];
            ALL_UNITS.forEach(unit => {
                if (unit !== fromUnit) {
                    document.getElementById(unit).value = smartFormat(areValue * conversionRates[unit]);
                }
            });
        }

        function clearAll() {
            ALL_UNITS.forEach(u => { document.getElementById(u).value = ''; });
            document.getElementById('are').focus();
        }
    </script>
</body>
</html>
